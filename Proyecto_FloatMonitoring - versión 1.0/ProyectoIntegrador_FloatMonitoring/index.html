<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float Monitoring | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .sensor-card {
            transition: transform 0.2s;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .sensor-card:hover {
            transform: scale(1.02);
        }

        .value-display {
            font-size: 3rem;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-droplet-half"></i> Float Monitoring</span>
            <span class="badge bg-light text-primary" id="connection-status">Online</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card sensor-card text-center h-100">
                    <div class="card-body">
                        <h5 class="text-muted text-uppercase small">Nivel de pH</h5>
                        <div id="ph-val" class="value-display text-primary">--</div>
                        <p class="card-text text-muted">Unidades de pH</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card sensor-card text-center h-100">
                    <div class="card-body">
                        <h5 class="text-muted text-uppercase small">Temp. Ambiente</h5>
                        <div id="temp-amb-val" class="value-display text-danger">--</div>
                        <p class="card-text text-muted">°Celsius</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card sensor-card text-center h-100">
                    <div class="card-body">
                        <h5 class="text-muted text-uppercase small">Temp. Agua</h5>
                        <div id="temp-agua-val" class="value-display text-info">--</div>
                        <p class="card-text text-muted">°Celsius</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                        <h5 class="mb-0 text-primary"><i class="bi bi-list-check"></i> Historial Reciente</h5>
                        <button onclick="cargarDatos()" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-arrow-clockwise"></i>
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Hora</th>
                                    <th>pH</th>
                                    <th>T. Amb</th>
                                    <th>T. Agua</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-cuerpo">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm h-100 border-primary">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0"><i class="bi bi-sliders"></i> Ajustar Umbrales</h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted small">Define los límites de alerta para el laboratorio.</p>
                        <form id="form-umbrales">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Variable</label>
                                <select id="update-variable" class="form-select form-select-sm">
                                    <option value="ph">pH del Agua</option>
                                    <option value="temp_ambiente">Temp. Ambiente</option>
                                    <option value="temp_agua">Temp. Agua</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Límite Mínimo</label>
                                <div class="input-group input-group-sm">
                                    <input type="number" step="0.1" id="update-min" class="form-control"
                                        placeholder="0.0">
                                    <span class="input-group-text">Min</span>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-bold">Límite Máximo</label>
                                <div class="input-group input-group-sm">
                                    <input type="number" step="0.1" id="update-max" class="form-control"
                                        placeholder="14.0">
                                    <span class="input-group-text">Max</span>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 shadow-sm">
                                Guardar Cambios
                            </button>
                        </form>
                        <div id="alert-container" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
        <br />
        <div class="row mb-5">
            <div class="col-md-6">
                <div class="card shadow-sm p-3">
                    <h5 class="text-muted small fw-bold text-uppercase">Tendencia de pH</h5>
                    <div style="height: 250px;"> <canvas id="grafica-ph"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm p-3">
                    <h5 class="text-muted small fw-bold text-uppercase">Tendencia de Temperatura</h5>
                    <div style="height: 250px;">
                        <canvas id="grafica-temp"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="script.js"></script>
</body>

</html>
